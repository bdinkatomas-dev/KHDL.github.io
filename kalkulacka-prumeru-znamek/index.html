<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulačka průměru</title>

<style>
body {
    margin: 0;
    font-family: "Inter", "Segoe UI", sans-serif;
    background: #0d1117;
    color: #c9d1d9;
}

/* GLASS BACKGROUND */
.container {
    max-width: 700px;
    margin: 80px auto;
    padding: 40px;
    background: rgba(22, 27, 34, 0.6);
    border: 1px solid rgba(33, 38, 45, 0.6);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* TITLE */
h1 {
    color: white;
}

/* INPUT ROW */
.row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #21262d;
    background: rgba(13,17,23,0.7);
    color: white;
}

/* BUTTONS */
button {
    padding: 10px 15px;
    margin-top: 10px;
    background: #58a6ff;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(88,166,255,0.3);
}

/* RESULT */
#out {
    margin-top: 20px;
    color: #58a6ff;
}
</style>
</head>

<body>

<div class="container">
    <h1>Kalkulačka průměru známek</h1>

    <div id="list">
        <div class="row">
            <input class="z" type="number" placeholder="Známka">
            <input class="v" type="number" placeholder="Váha">
        </div>
    </div>

    <button onclick="add()">+ přidat známku</button>
    <button onclick="calc()">spočítat</button>

    <h2 id="out">Průměr: -</h2>
</div>

<script>
function add(){
    let d = document.createElement("div");
    d.className = "row";
    d.innerHTML = `
        <input class="z" type="number" placeholder="Známka">
        <input class="v" type="number" placeholder="Váha">
    `;
    document.getElementById("list").appendChild(d);
}

function calc(){
    let s = 0, w = 0;

    document.querySelectorAll(".row").forEach(r=>{
        let z = parseFloat(r.querySelector(".z").value);
        let v = parseFloat(r.querySelector(".v").value);

        if(!isNaN(z) && !isNaN(v)){
            s += z * v;
            w += v;
        }
    });

    let p = s / w;
    document.getElementById("out").innerText =
        "Průměr: " + p.toFixed(2);
}
</script>
</body>
</html>
